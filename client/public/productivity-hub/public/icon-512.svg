<?xml version="1.0" encoding="UTF-8"?>
<svg width="192" height="192" viewBox="0 0 192 192" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="192" height="192" rx="36" fill="#6366f1"/>
  
  <!-- Icon content - Productivity Hub -->
  <g fill="white">
    <!-- Task checkmarks -->
    <circle cx="60" cy="60" r="8" fill="white"/>
    <path d="M54 60 L58 64 L66 56" stroke="#6366f1" stroke-width="3" fill="none" stroke-linecap="round"/>
    
    <circle cx="60" cy="90" r="8" fill="white"/>
    <path d="M54 90 L58 94 L66 86" stroke="#6366f1" stroke-width="3" fill="none" stroke-linecap="round"/>
    
    <!-- Calendar grid -->
    <rect x="100" y="45" width="50" height="40" rx="4" fill="none" stroke="white" stroke-width="2"/>
    <line x1="110" y1="45" x2="110" y2="85" stroke="white" stroke-width="1"/>
    <line x1="120" y1="45" x2="120" y2="85" stroke="white" stroke-width="1"/>
    <line x1="130" y1="45" x2="130" y2="85" stroke="white" stroke-width="1"/>
    <line x1="140" y1="45" x2="140" y2="85" stroke="white" stroke-width="1"/>
    <line x1="100" y1="55" x2="150" y2="55" stroke="white" stroke-width="1"/>
    <line x1="100" y1="65" x2="150" y2="65" stroke="white" stroke-width="1"/>
    <line x1="100" y1="75" x2="150" y2="75" stroke="white" stroke-width="1"/>
    
    <!-- Timer circle -->
    <circle cx="96" cy="126" r="18" fill="none" stroke="white" stroke-width="3"/>
    <circle cx="96" cy="126" r="3" fill="white"/>
    <line x1="96" y1="126" x2="96" y2="115" stroke="white" stroke-width="2" stroke-linecap="round"/>
    <line x1="96" y1="126" x2="104" y2="126" stroke="white" stroke-width="2" stroke-linecap="round"/>
    
    <!-- Habit tracking dots -->
    <circle cx="140" cy="120" r="4" fill="#10b981"/>
    <circle cx="150" cy="120" r="4" fill="#10b981"/>
    <circle cx="160" cy="120" r="4" fill="#94a3b8"/>
    <circle cx="140" cy="135" r="4" fill="#10b981"/>
    <circle cx="150" cy="135" r="4" fill="#94a3b8"/>
    <circle cx="160" cy="135" r="4" fill="#94a3b8"/>
  </g>
</svg>
